<div class="nf-page">
  <!-- ══ PLUIE DE SKILLS ══ -->
  <div class="skills-rain" aria-hidden="true">
    @for (skill of profile.skills; track skill; let i = $index) {
      <span
        class="rain-skill"
        [style.left]="getSkillLeft(i)"
        [style.animation-delay]="getSkillDelay(i)"
        [style.animation-duration]="getSkillDuration(i)"
        >{{ skill.name }}</span
      >
    }
  </div>

  <!-- ══ CONTENU CENTRAL ══ -->
  <div class="nf-center">
    <!-- Gros 404 -->
    <div class="nf-glitch-wrap" aria-hidden="true">
      <span class="nf-404" data-text="404">404</span>
    </div>

    <!-- Badge -->
    <div class="nf-badge">
      <span class="nf-badge-dot"></span>
      Page introuvable
    </div>

    <h1 class="nf-title">
      Oups, vous vous êtes<br />
      <strong>perdu.</strong>
    </h1>

    <p class="nf-sub">Cette page n'existe pas (ou plus).<br /></p>

    <!-- Actions -->
    <div class="nf-actions">
      <button class="btn btn-primary" (click)="goHome()">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M3 10.5L12 3L21 10.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V10.5Z"
          />
        </svg>
        Retour à l'accueil
      </button>
      <button class="btn btn-outline" (click)="goHome()">
        Voir mes projets
      </button>
    </div>
  </div>

  <!-- ══ TERMINAL ══ -->
  <div class="nf-terminal">
    <div class="terminal-bar">
      <span class="t-dot t-red"></span>
      <span class="t-dot t-yellow"></span>
      <span class="t-dot t-green"></span>
      <span class="terminal-title">bash — portfolio</span>
    </div>
    <div class="terminal-body">
      @for (line of visibleLines; track line) {
        <p class="terminal-line" [class.line-error]="line.includes('ERREUR')">
          {{ line }}
        </p>
      }
      <span class="terminal-cursor">█</span>
    </div>
  </div>

  <!-- Décorations hero (mêmes que la page d'accueil) -->
  <div class="hero-deco hero-deco-1"></div>
  <div class="hero-deco hero-deco-2"></div>
</div>
